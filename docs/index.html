<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>富喜屋 社内アプリ マニュアル一覧</title>
<style>
  :root {
    --brand-orange: #EA570F;
    --brand-orange-soft: #FBDCC5;
    --ink: #2B2016;
    --ink-soft: #6B5C4C;
    --paper: #FFFBF6;
    --paper-card: #FFFFFF;
    --line: #E9DCC9;
    --shadow: 0 1px 2px rgba(43, 32, 22, 0.04), 0 8px 24px -12px rgba(43, 32, 22, 0.18);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-orange: #FF8A4C;
      --brand-orange-soft: #4A2A16;
      --ink: #F3E9DC;
      --ink-soft: #C7B7A3;
      --paper: #1B140E;
      --paper-card: #241B13;
      --line: #40331F;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px -12px rgba(0, 0, 0, 0.5);
    }
  }
  :root[data-theme="dark"] {
    --brand-orange: #FF8A4C; --brand-orange-soft: #4A2A16; --ink: #F3E9DC; --ink-soft: #C7B7A3;
    --paper: #1B140E; --paper-card: #241B13; --line: #40331F;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px -12px rgba(0, 0, 0, 0.5);
  }
  :root[data-theme="light"] {
    --brand-orange: #EA570F; --brand-orange-soft: #FBDCC5; --ink: #2B2016; --ink-soft: #6B5C4C;
    --paper: #FFFBF6; --paper-card: #FFFFFF; --line: #E9DCC9;
    --shadow: 0 1px 2px rgba(43, 32, 22, 0.04), 0 8px 24px -12px rgba(43, 32, 22, 0.18);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", "Segoe UI", sans-serif;
    line-height: 1.9;
  }
  .sheet { max-width: 640px; margin: 0 auto; padding: 56px 24px 96px; }
  .eyebrow {
    font-size: 0.78rem; letter-spacing: 0.08em; color: var(--brand-orange);
    font-weight: 700; text-transform: uppercase;
  }
  h1 { font-size: 1.9rem; font-weight: 800; margin: 10px 0 32px; letter-spacing: -0.01em; }
  .list { display: flex; flex-direction: column; gap: 12px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    background: var(--paper-card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px; box-shadow: var(--shadow);
  }
  .card .name { font-weight: 700; font-size: 1.02rem; margin-bottom: 4px; }
  .card .desc { font-size: 0.88rem; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="sheet">
  <span class="eyebrow">株式会社富喜屋</span>
  <h1>社内アプリ マニュアル一覧</h1>
  <div class="list">
    <a class="card" href="./rena-check/">
      <div class="name">献立表×栄養出納帳 突合チェック</div>
      <div class="desc">献立表と栄養出納帳の食品群集計が一致しているかを自動チェック</div>
    </a>
  </div>
</div>
</body>
</html>
